<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>Rec Specs</title>
  <style>
    :root {
      --bg:           #0a0a0a;
      --surface:      #161616;
      --border:       #2a2a2a;
      --field-bg:     #0a1f10;
      --green-field:  #22c55e;
      --gray:         #6b7280;
      --white:        #f5f5f5;
      --red:          #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Views ─────────────────────────────── */
    .view { display: none; height: 100dvh; flex-direction: column; }
    .view.active { display: flex; }

    /* ── Setup Screen ───────────────────────── */
    #setup-screen { padding: 28px 20px 0; }

    .setup-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .setup-header h1 {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--green-light);
    }
    .setup-header p {
      font-size: 13px;
      color: var(--gray);
      margin-top: 5px;
    }

    /* ── Number Grid ────────────────────────── */
    .number-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      flex: 1;
      align-content: start;
      overflow-y: auto;
      padding-bottom: 8px;
    }

    .num-btn {
      aspect-ratio: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 50%;
      color: var(--gray);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }

    .num-btn.selected {
      background: var(--green-field);
      border-color: var(--green-field);
      color: white;
    }

    .num-btn:active { opacity: 0.75; }

    .setup-footer {
      padding: 16px 0 max(20px, env(safe-area-inset-bottom));
    }
    .btn-start {
      width: 100%;
      background: var(--green-field);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .btn-start:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-start:not(:disabled):active { opacity: 0.8; }

    /* ── Game Screen ────────────────────────── */
    #game-screen { overflow: hidden; }

    /* Timer Bar */
    .timer-bar {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      padding: max(10px, env(safe-area-inset-top)) 16px 12px;
      gap: 8px;
    }
    .timer-top {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .timer-display {
      font-size: 28px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
      text-align: center;
      transition: color 0.3s;
    }
    .timer-display.alert { color: var(--red); }
    .timer-display.small-label { font-size: 17px; letter-spacing: 0.5px; }

    .timer-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .btn-ctrl-play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--green-field);
      color: white;
      border: none;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-ctrl-play:active { opacity: 0.75; }
    .btn-ctrl-skip {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--gray);
      font-size: 13px;
      font-weight: 700;
      padding: 9px 16px;
      cursor: pointer;
      min-width: 60px;
    }
    .btn-ctrl-skip:active:not(:disabled) { opacity: 0.75; }
    .btn-ctrl-skip:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-ctrl-draw {
      position: absolute;
      right: 0;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--gray);
      font-size: 16px;
      padding: 6px 10px;
      cursor: pointer;
      line-height: 1;
    }
    .btn-ctrl-draw:active { opacity: 0.75; }
    .btn-ctrl-draw.active {
      border-color: rgba(250,204,21,0.7);
      color: rgba(250,204,21,0.9);
    }

    /* Field Wrapper */
    .field-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      min-height: 0;
    }

    /* Soccer Field */
    #field {
      position: relative;
      background: var(--field-bg);
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.18);
      height: 100%;
      aspect-ratio: 2 / 3;
      max-width: 100%;
    }

    /* Field markings */
    .field-mark {
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }
    .line-center {
      left: 0; right: 0;
      top: 50%;
      height: 1.5px;
      background: rgba(255,255,255,0.5);
      transform: translateY(-50%);
    }
    .circle-center {
      left: 50%; top: 50%;
      width: 22%; aspect-ratio: 1;
      border: 1.5px solid rgba(255,255,255,0.45);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    .box-top {
      left: 50%; top: 0;
      width: 52%; height: 16%;
      border: 1.5px solid rgba(255,255,255,0.45);
      border-top: none;
      transform: translateX(-50%);
    }
    .box-bottom {
      left: 50%; bottom: 0;
      width: 52%; height: 16%;
      border: 1.5px solid rgba(255,255,255,0.45);
      border-bottom: none;
      transform: translateX(-50%);
    }
    .goal-top {
      left: 50%; top: 0;
      width: 26%; height: 5%;
      border: 1.5px solid rgba(255,255,255,0.55);
      border-top: none;
      background: rgba(255,255,255,0.07);
      transform: translateX(-50%);
    }
    .goal-bottom {
      left: 50%; bottom: 0;
      width: 26%; height: 5%;
      border: 1.5px solid rgba(255,255,255,0.55);
      border-bottom: none;
      background: rgba(255,255,255,0.07);
      transform: translateX(-50%);
    }

    /* Drop Zones */
    .drop-zone {
      position: absolute;
      width: 48px;
      height: 48px;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dz-ring {
      position: absolute;
      width: 44px;
      height: 44px;
      border: 2px dashed rgba(255,255,255,0.35);
      border-radius: 50%;
      transition: border-color 0.15s, background 0.15s;
    }
    .drop-zone.occupied .dz-ring { display: none; }
    .drop-zone.drag-over .dz-ring {
      border-color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.12);
    }
    .dz-label {
      position: absolute;
      top: calc(100% + 3px);
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.5px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Zone positions — all in our half (bottom 50% of field) */
    #dz-fw1  { left: 20%; top: 59%; }
    #dz-fw2  { left: 50%; top: 56%; }
    #dz-fw3  { left: 80%; top: 59%; }
    #dz-def1 { left: 20%; top: 74%; }
    #dz-def2 { left: 50%; top: 71%; }
    #dz-def3 { left: 80%; top: 74%; }
    #dz-gk   { left: 50%; top: 88%; }

    /* Player Tokens */
    .player-token {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      touch-action: none;
      cursor: grab;
      position: relative;
      z-index: 3;
      flex-shrink: 0;
    }
    .player-token.on-field {
      background: var(--white);
      color: #111827;
      box-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }
    .player-token.on-sub {
      background: #222222;
      color: var(--gray);
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .player-token.dragging { opacity: 0.25; }

    /* Sub Strip */
    .sub-strip {
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      padding: 10px 14px max(12px, env(safe-area-inset-bottom));
    }
    .sub-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--gray);
      letter-spacing: 1.2px;
      margin-bottom: 8px;
    }
    .sub-tokens {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 40px;
      align-items: center;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .sub-tokens.drag-over { background: rgba(255,255,255,0.05); }

    /* Drag Clone */
    #drag-clone {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%) scale(1.15);
      display: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
    }

    /* ── Draw Mode ──────────────────────────── */
    #draw-toolbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: rgba(250,204,21,0.12);
      border-bottom: 1px solid rgba(250,204,21,0.3);
      flex-shrink: 0;
    }
    .draw-mode-active #draw-toolbar { display: flex; }

    .draw-mode-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: rgba(250,204,21,0.9);
    }
    .btn-clear {
      background: transparent;
      border: 1.5px solid rgba(250,204,21,0.5);
      border-radius: 8px;
      color: rgba(250,204,21,0.9);
      font-size: 13px;
      font-weight: 700;
      padding: 5px 12px;
      cursor: pointer;
    }
    .btn-clear:active { opacity: 0.7; }

    /* Field border highlight in draw mode */
    .draw-mode-active #field { border-color: rgba(250,204,21,0.8); }

    /* Hide zone UI in draw mode — replaced by free draw-tokens */
    .draw-mode-active .dz-ring,
    .draw-mode-active .dz-label,
    .draw-mode-active .drop-zone .player-token { display: none; }

    /* Sub strip fades in draw mode */
    .draw-mode-active .sub-strip { opacity: 0.35; pointer-events: none; }

    /* Free-floating player tokens in draw mode */
    .draw-token {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 5;
      touch-action: none;
      cursor: grab;
    }
    .draw-token.dragging { opacity: 0.3; }

    /* ── Peek Mode (press-and-hold to see play times) ── */
    .peek-mode .player-token {
      font-size: 10px;
      background: rgba(10,10,10,0.88) !important;
      color: #fbbf24 !important;
      letter-spacing: 0.5px;
    }
    .peek-mode .timer-bar {
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    /* Sub recommendations — rings visible only during peek */
    .peek-mode .player-token.sub-out-hint {
      box-shadow: 0 0 0 3px #ef4444;
    }
    .peek-mode .player-token.sub-in-hint {
      box-shadow: 0 0 0 3px #22c55e;
    }

    /* ── Confirmation Modal ─────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.active { display: flex; }

    .modal-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 26px 22px;
      width: 100%;
      max-width: 300px;
      text-align: center;
    }
    .modal-box h3 {
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .modal-box p {
      font-size: 15px;
      color: var(--gray);
      margin-bottom: 22px;
      line-height: 1.5;
    }
    .modal-buttons { display: flex; gap: 10px; }
    .btn-modal {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-modal.yes { background: var(--green-field); color: white; }
    .btn-modal.no  { background: var(--border); color: var(--gray); }
    .btn-modal:active { opacity: 0.75; }

    /* ── Halftime / Fulltime Report ─────────── */
    .report-box {
      max-height: 78dvh;
      display: flex;
      flex-direction: column;
      padding: 22px 20px 20px;
      text-align: left;
    }
    .report-title {
      color: var(--red);
      font-size: 18px;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
    }
    .report-legend {
      display: flex;
      gap: 14px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .report-legend span {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .report-legend span::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .leg-fw::before  { background: #38bdf8; }
    .leg-def::before { background: #a78bfa; }
    .leg-gk::before  { background: #fbbf24; }
    .leg-fw  { color: #38bdf8; }
    .leg-def { color: #a78bfa; }
    .leg-gk  { color: #fbbf24; }

    .report-list { flex: 1; overflow-y: auto; }

    .report-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }
    .report-row:last-child { border-bottom: none; }

    .report-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .report-row.fresh    .report-dot { background: #22c55e; }
    .report-row.moderate .report-dot { background: transparent; }
    .report-row.heavy    .report-dot { background: #ef4444; }

    .report-num {
      font-size: 14px;
      font-weight: 800;
      color: var(--white);
      min-width: 32px;
    }
    .report-time {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      min-width: 36px;
      font-variant-numeric: tabular-nums;
    }
    .report-bar-outer {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      display: flex;
    }
    .bar-fw  { background: #38bdf8; height: 100%; flex-shrink: 0; }
    .bar-def { background: #a78bfa; height: 100%; flex-shrink: 0; }
    .bar-gk  { background: #fbbf24; height: 100%; flex-shrink: 0; }
  </style>
</head>
<body>

<!-- ══ SETUP SCREEN ══════════════════════════ -->
<div id="setup-screen" class="view active">
  <div class="setup-header">
    <h1>Rec Specs</h1>
    <p id="setup-count">Tap to select your players</p>
  </div>

  <div class="number-grid" id="number-grid"></div>

  <div class="setup-footer">
    <button class="btn-start" id="btn-start-game" disabled>Start Game</button>
  </div>
</div>

<!-- ══ GAME SCREEN ════════════════════════════ -->
<div id="game-screen" class="view">

  <div class="timer-bar">
    <div class="timer-top">
      <div class="timer-display" id="timer-display">00:00</div>
      <button class="btn-ctrl-draw" id="btn-draw">&#9998;</button>
    </div>
    <div class="timer-controls">
      <button class="btn-ctrl-skip" id="btn-skip-back" disabled>−30s</button>
      <button class="btn-ctrl-play" id="btn-action">&#9654;</button>
      <button class="btn-ctrl-skip" id="btn-skip-fwd" disabled>+30s</button>
    </div>
  </div>

  <!-- Draw mode toolbar (hidden in game mode) -->
  <div id="draw-toolbar">
    <span class="draw-mode-label">DRAW MODE</span>
    <button class="btn-clear" id="btn-clear">Clear</button>
  </div>

  <div class="field-wrapper">
    <div id="field">
      <!-- Markings -->
      <div class="field-mark line-center"></div>
      <div class="field-mark circle-center"></div>
      <div class="field-mark box-top"></div>
      <div class="field-mark box-bottom"></div>
      <div class="field-mark goal-top"></div>
      <div class="field-mark goal-bottom"></div>

      <!-- SVG overlay: build-out lines + corner arcs -->
      <svg class="field-mark" style="top:0;left:0;width:100%;height:100%;" viewBox="0 0 200 300" preserveAspectRatio="none">
        <!-- Build-out lines (white dashed, at 1/3 and 2/3 field length) -->
        <line x1="0" y1="100" x2="200" y2="100" stroke="white" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="6 4"/>
        <line x1="0" y1="200" x2="200" y2="200" stroke="white" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="6 4"/>
        <!-- Corner arcs (quarter circles, radius = 10 units) -->
        <path d="M 10 0 A 10 10 0 0 1 0 10"        fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
        <path d="M 190 0 A 10 10 0 0 0 200 10"    fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
        <path d="M 0 290 A 10 10 0 0 1 10 300"    fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
        <path d="M 200 290 A 10 10 0 0 0 190 300" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
      </svg>

      <!-- Drawing canvas (shown only in draw mode) -->
      <canvas id="draw-canvas" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;"></canvas>

      <!-- Drop zones -->
      <div class="drop-zone" id="dz-fw1"  data-zone="fw1">  <div class="dz-ring"></div><span class="dz-label">FWD</span></div>
      <div class="drop-zone" id="dz-fw2"  data-zone="fw2">  <div class="dz-ring"></div><span class="dz-label">FWD</span></div>
      <div class="drop-zone" id="dz-fw3"  data-zone="fw3">  <div class="dz-ring"></div><span class="dz-label">FWD</span></div>
      <div class="drop-zone" id="dz-def1" data-zone="def1"> <div class="dz-ring"></div><span class="dz-label">DEF</span></div>
      <div class="drop-zone" id="dz-def2" data-zone="def2"> <div class="dz-ring"></div><span class="dz-label">DEF</span></div>
      <div class="drop-zone" id="dz-def3" data-zone="def3"> <div class="dz-ring"></div><span class="dz-label">DEF</span></div>
      <div class="drop-zone" id="dz-gk"   data-zone="gk">   <div class="dz-ring"></div><span class="dz-label">GK</span></div>
    </div>
  </div>

  <div class="sub-strip">
    <div class="sub-label">SUBS</div>
    <div class="sub-tokens" id="sub-tokens"></div>
  </div>

</div>

<!-- ══ DRAG CLONE ════════════════════════════ -->
<div id="drag-clone"></div>

<!-- ══ CONFIRMATION MODAL ════════════════════ -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <h3>Make Sub?</h3>
    <p id="confirm-text"></p>
    <div class="modal-buttons">
      <button class="btn-modal yes" id="confirm-yes">Sub In</button>
      <button class="btn-modal no"  id="confirm-no">Cancel</button>
    </div>
  </div>
</div>

<!-- ══ HALFTIME / FULLTIME REPORT ════════════ -->
<div class="modal-overlay" id="report-modal">
  <div class="modal-box report-box">
    <h3 id="report-title" class="report-title"></h3>
    <div class="report-legend">
      <span class="leg-fw">FWD</span>
      <span class="leg-def">DEF</span>
      <span class="leg-gk">GK</span>
    </div>
    <div class="report-list" id="report-list"></div>
    <div class="modal-buttons" style="margin-top:18px">
      <button class="btn-modal no" id="report-close">Close</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const ZONES = ['fw1','fw2','fw3','def1','def2','def3','gk'];
const HALF  = 20 * 60; // 1200 seconds

// Default zone positions (% of field width/height) — used to seed draw-tokens
const ZONE_POS = {
  fw1:  {x:20, y:59}, fw2:  {x:50, y:56}, fw3:  {x:80, y:59},
  def1: {x:20, y:74}, def2: {x:50, y:71}, def3: {x:80, y:74},
  gk:   {x:50, y:88},
};

const state = {
  players: [],
  field:   { fw1:null, fw2:null, fw3:null, def1:null, def2:null, def3:null, gk:null },
  subs:    [],
  timer: {
    elapsed:          0,
    phase:            'idle', // idle | running | paused | halftime | fulltime
    interval:         null,
    secondHalfActive: false,
  },
  drawMode: false,
  wakeLock: null,
  playTime: {}, // { jerseyNum: seconds } — cumulative on-field time per player
  posTime:  {}, // { jerseyNum: { fw:0, def:0, gk:0 } } — time by position group
};

// ─────────────────────────────────────────────
//  SETUP SCREEN
// ─────────────────────────────────────────────
const setupCount   = document.getElementById('setup-count');
const btnStartGame = document.getElementById('btn-start-game');
const numberGrid   = document.getElementById('number-grid');

// Build tap-to-select grid (0–30)
for (let i = 0; i <= 30; i++) {
  const btn = document.createElement('button');
  btn.className   = 'num-btn';
  btn.dataset.num = String(i);
  btn.textContent = i;
  btn.addEventListener('click', () => {
    const num = btn.dataset.num;
    if (state.players.includes(num)) {
      state.players = state.players.filter(p => p !== num);
    } else {
      state.players.push(num);
    }
    renderSetup();
  });
  numberGrid.appendChild(btn);
}

function renderSetup() {
  numberGrid.querySelectorAll('.num-btn').forEach(btn => {
    btn.classList.toggle('selected', state.players.includes(btn.dataset.num));
  });
  const n = state.players.length;
  setupCount.textContent = n === 0
    ? 'Tap to select your players'
    : `${n} player${n !== 1 ? 's' : ''} selected`;
  btnStartGame.disabled = n < 1;
}

btnStartGame.addEventListener('click', () => {
  state.subs = [...state.players];
  ZONES.forEach(z => state.field[z] = null);
  state.playTime = {};
  state.posTime  = {};
  state.players.forEach(num => {
    state.playTime[num] = 0;
    state.posTime[num]  = { fw:0, def:0, gk:0 };
  });
  document.getElementById('setup-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  renderGame();
});

// ─────────────────────────────────────────────
//  TIMER
// ─────────────────────────────────────────────
const timerDisplay = document.getElementById('timer-display');
const btnAction    = document.getElementById('btn-action');
const btnSkipBack  = document.getElementById('btn-skip-back');
const btnSkipFwd   = document.getElementById('btn-skip-fwd');

function pad(n) { return String(n).padStart(2, '0'); }
function fmt(s) { return `${pad(Math.floor(s / 60))}:${pad(s % 60)}`; }

function renderTimer() {
  const { elapsed, phase } = state.timer;
  timerDisplay.className = 'timer-display';

  const skipsEnabled = (phase === 'running' || phase === 'paused');
  btnSkipBack.disabled = !skipsEnabled;
  btnSkipFwd.disabled  = !skipsEnabled;
  btnAction.style.display = '';

  switch (phase) {
    case 'idle':
      timerDisplay.textContent = '00:00';
      btnAction.textContent = '▶';
      break;
    case 'running':
      timerDisplay.textContent = fmt(elapsed);
      btnAction.textContent = '⏸';
      break;
    case 'paused':
      timerDisplay.textContent = fmt(elapsed);
      btnAction.textContent = '▶';
      break;
    case 'halftime':
      timerDisplay.classList.add('alert', 'small-label');
      timerDisplay.textContent = 'HALF';
      btnAction.textContent = '2H';
      break;
    case 'fulltime':
      timerDisplay.classList.add('alert', 'small-label');
      timerDisplay.textContent = 'FULL';
      btnAction.style.display = 'none';
      break;
  }
}

async function acquireWakeLock() {
  try {
    if ('wakeLock' in navigator) state.wakeLock = await navigator.wakeLock.request('screen');
  } catch (_) {}
}

function releaseWakeLock() {
  if (state.wakeLock) { state.wakeLock.release().catch(() => {}); state.wakeLock = null; }
}

function tick() {
  state.timer.elapsed++;
  // Accumulate play time + position time for all currently on-field players
  ZONES.forEach(zone => {
    const num = state.field[zone];
    if (num !== null) {
      state.playTime[num] = (state.playTime[num] || 0) + 1;
      if (!state.posTime[num]) state.posTime[num] = { fw:0, def:0, gk:0 };
      const pos = zone.startsWith('fw') ? 'fw' : zone.startsWith('def') ? 'def' : 'gk';
      state.posTime[num][pos]++;
    }
  });
  // Keep peek display live while held
  if (peekActive) {
    document.querySelectorAll('#game-screen .player-token').forEach(token => {
      if (token.dataset.num && token.dataset.savedText !== undefined)
        token.textContent = fmtPlayTime(state.playTime[token.dataset.num] || 0);
    });
    applySubHints();
  }
  if (state.timer.elapsed >= HALF) {
    clearInterval(state.timer.interval);
    state.timer.interval = null;
    releaseWakeLock();
    state.timer.phase = state.timer.secondHalfActive ? 'fulltime' : 'halftime';
    if ('vibrate' in navigator) navigator.vibrate([300, 100, 300]);
    setTimeout(() => showReport(state.timer.phase), 350);
  }
  renderTimer();
}

btnAction.addEventListener('click', () => {
  const { phase } = state.timer;
  if (phase === 'idle' || phase === 'paused') {
    state.timer.phase = 'running';
    state.timer.interval = setInterval(tick, 1000);
    acquireWakeLock();
  } else if (phase === 'running') {
    clearInterval(state.timer.interval);
    state.timer.interval = null;
    state.timer.phase = 'paused';
    releaseWakeLock();
  } else if (phase === 'halftime') {
    state.timer.elapsed = 0;
    state.timer.secondHalfActive = true;
    state.timer.phase = 'running';
    state.timer.interval = setInterval(tick, 1000);
    acquireWakeLock();
  }
  renderTimer();
});

function doReset() {
  clearInterval(state.timer.interval);
  releaseWakeLock();
  Object.assign(state.timer, { elapsed:0, phase:'idle', interval:null, secondHalfActive:false });
  state.players.forEach(num => {
    state.playTime[num] = 0;
    state.posTime[num]  = { fw:0, def:0, gk:0 };
  });
  renderTimer();
}

// +30s skip forward
btnSkipFwd.addEventListener('click', () => {
  const { phase } = state.timer;
  if (phase !== 'running' && phase !== 'paused') return;
  state.timer.elapsed = Math.min(HALF - 1, state.timer.elapsed + 30);
  renderTimer();
});

// −30s tap = skip back 30s; long-hold 600ms = full reset
let skipHoldTimer = null;
let skipHoldFired = false;

btnSkipBack.addEventListener('touchstart', e => {
  e.preventDefault();
  skipHoldFired = false;
  skipHoldTimer = setTimeout(() => {
    skipHoldFired = true;
    doReset();
  }, 600);
}, { passive: false });

btnSkipBack.addEventListener('touchend', () => {
  clearTimeout(skipHoldTimer);
  skipHoldTimer = null;
  if (!skipHoldFired) {
    const { phase } = state.timer;
    if (phase !== 'running' && phase !== 'paused') return;
    state.timer.elapsed = Math.max(0, state.timer.elapsed - 30);
    renderTimer();
  }
  skipHoldFired = false;
});

btnSkipBack.addEventListener('touchcancel', () => {
  clearTimeout(skipHoldTimer);
  skipHoldTimer = null;
  skipHoldFired = false;
});

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderGame() {
  renderField();
  renderSubs();
  renderTimer();
}

function renderField() {
  ZONES.forEach(zone => {
    const dz  = document.getElementById(`dz-${zone}`);
    const num = state.field[zone];

    // Remove existing token (sibling to ring, not inside it)
    const existing = dz.querySelector('.player-token');
    if (existing) existing.remove();

    if (num !== null) {
      dz.classList.add('occupied');
      dz.appendChild(makeToken(num, 'on-field', zone));
    } else {
      dz.classList.remove('occupied');
    }
  });
}

function renderSubs() {
  const container = document.getElementById('sub-tokens');
  container.innerHTML = '';
  state.subs.forEach(num => container.appendChild(makeToken(num, 'on-sub', 'sub')));
}

function makeToken(num, cls, origin) {
  const el = document.createElement('div');
  el.className = `player-token ${cls}`;
  el.textContent = `#${num}`;
  el.dataset.num    = num;
  el.dataset.origin = origin;
  el.addEventListener('touchstart', onTouchStart, { passive: false });
  return el;
}

// ─────────────────────────────────────────────
//  DRAG AND DROP
// ─────────────────────────────────────────────
let drag = null; // { num, origin, el }
const clone = document.getElementById('drag-clone');

function onTouchStart(e) {
  if (state.drawMode) return; // draw mode uses its own field-level handler
  e.preventDefault();
  const t  = e.touches[0];
  const el = e.currentTarget;

  // Style the floating clone
  clone.textContent  = el.textContent;
  clone.style.background  = el.classList.contains('on-field') ? '#f5f5f5' : '#222222';
  clone.style.color       = el.classList.contains('on-field') ? '#111827' : '#6b7280';
  clone.style.boxShadow   = '0 4px 16px rgba(0,0,0,0.5)';
  clone.style.left        = t.clientX + 'px';
  clone.style.top         = t.clientY + 'px';
  clone.style.display     = 'flex';

  el.classList.add('dragging');

  drag = { num: el.dataset.num, origin: el.dataset.origin, el };

  document.addEventListener('touchmove', onTouchMove, { passive: false });
  document.addEventListener('touchend',  onTouchEnd);
}

function onTouchMove(e) {
  e.preventDefault();
  if (!drag) return;
  const t = e.touches[0];
  clone.style.left = t.clientX + 'px';
  clone.style.top  = t.clientY + 'px';
  highlightTarget(t.clientX, t.clientY);
}

function onTouchEnd(e) {
  if (!drag) return;
  document.removeEventListener('touchmove', onTouchMove);
  document.removeEventListener('touchend',  onTouchEnd);

  const t = e.changedTouches[0];

  clearHighlights();
  drag.el.classList.remove('dragging');

  const target = getTarget(t.clientX, t.clientY);
  clone.style.display = 'none'; // hide AFTER getTarget, not before
  if (target) handleDrop(target);

  drag = null;
  renderGame();
}

// Find the drop target under the finger (hide clone first so it doesn't block)
function getTarget(x, y) {
  clone.style.display = 'none';
  const el = document.elementFromPoint(x, y);
  clone.style.display = 'flex'; // always restore; onTouchEnd hides it after calling us
  if (!el) return null;

  const dz  = el.closest('.drop-zone');
  if (dz) return { type: 'zone', zone: dz.dataset.zone };

  const sub = el.closest('.sub-strip');
  if (sub) return { type: 'sub' };

  return null;
}

function highlightTarget(x, y) {
  clearHighlights();
  const target = getTarget(x, y);
  if (!target) return;
  if (target.type === 'zone') {
    document.getElementById(`dz-${target.zone}`).classList.add('drag-over');
  } else {
    document.getElementById('sub-tokens').classList.add('drag-over');
  }
}

function clearHighlights() {
  document.querySelectorAll('.drop-zone.drag-over').forEach(el => el.classList.remove('drag-over'));
  document.getElementById('sub-tokens').classList.remove('drag-over');
}

// ─────────────────────────────────────────────
//  DROP LOGIC
// ─────────────────────────────────────────────
function handleDrop(target) {
  const { num, origin } = drag;

  if (target.type === 'sub') {
    if (origin === 'sub') return;             // already a sub
    state.field[origin] = null;
    if (!state.subs.includes(num)) state.subs.push(num);
    return;
  }

  const zone     = target.zone;
  const occupant = state.field[zone];

  if (!occupant) {
    // Empty slot — place directly
    placeOnField(num, origin, zone);
  } else if (origin !== 'sub') {
    // Field → occupied Field — direct swap
    state.field[origin] = occupant;
    state.field[zone]   = num;
  } else {
    // Sub → occupied Field — needs confirmation
    pendingSub = { num, occupant, zone };
    showConfirm(num, occupant);
  }
}

function placeOnField(num, origin, zone) {
  if (origin === 'sub') {
    state.subs = state.subs.filter(p => p !== num);
  } else {
    state.field[origin] = null;
  }
  state.field[zone] = num;
}

// ─────────────────────────────────────────────
//  CONFIRMATION MODAL
// ─────────────────────────────────────────────
let pendingSub = null;

const confirmModal = document.getElementById('confirm-modal');
const confirmText  = document.getElementById('confirm-text');
const confirmYes   = document.getElementById('confirm-yes');
const confirmNo    = document.getElementById('confirm-no');

function showConfirm(inNum, outNum) {
  confirmText.textContent = `Put #${inNum} in for #${outNum}?`;
  confirmModal.classList.add('active');
}

confirmYes.addEventListener('click', () => {
  confirmModal.classList.remove('active');
  if (!pendingSub) return;
  const { num, occupant, zone } = pendingSub;
  state.subs        = state.subs.filter(p => p !== num);
  state.field[zone] = num;
  if (!state.subs.includes(occupant)) state.subs.push(occupant);
  pendingSub = null;
  renderGame();
});

confirmNo.addEventListener('click', () => {
  confirmModal.classList.remove('active');
  pendingSub = null;
});

// ─────────────────────────────────────────────
//  DRAW & SHIFT MODE
// ─────────────────────────────────────────────
const gameScreen = document.getElementById('game-screen');
const fieldEl    = document.getElementById('field');
const drawCanvas = document.getElementById('draw-canvas');
const btnDraw    = document.getElementById('btn-draw');
const btnClear   = document.getElementById('btn-clear');
const ctx        = drawCanvas.getContext('2d');

// ── Canvas helpers ────────────────────────────
function resizeCanvas() {
  drawCanvas.width  = fieldEl.offsetWidth;
  drawCanvas.height = fieldEl.offsetHeight;
  applyCtxStyles();
}
function applyCtxStyles() {
  ctx.strokeStyle = 'rgba(255,255,255,0.88)';
  ctx.lineWidth   = 4;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
}
function clearCanvas() {
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}
function getCanvasCoords(touch) {
  const r = drawCanvas.getBoundingClientRect();
  return {
    x: (touch.clientX - r.left) * (drawCanvas.width  / r.width),
    y: (touch.clientY - r.top)  * (drawCanvas.height / r.height),
  };
}

// ── Enter / Exit ──────────────────────────────
function enterDrawMode() {
  state.drawMode = true;
  resizeCanvas();
  drawCanvas.style.display = 'block';
  gameScreen.classList.add('draw-mode-active');
  btnDraw.classList.add('active');

  // Spawn free-floating draw-tokens at each occupied zone position
  ZONES.forEach(zone => {
    const num = state.field[zone];
    if (!num) return;
    const { x, y } = ZONE_POS[zone];
    const token = document.createElement('div');
    token.className = 'player-token on-field draw-token';
    token.textContent = `#${num}`;
    token.dataset.num  = num;
    token.dataset.zone = zone;
    token.style.left = x + '%';
    token.style.top  = y + '%';
    fieldEl.appendChild(token);
  });
}

function exitDrawMode() {
  state.drawMode = false;
  clearCanvas();
  drawCanvas.style.display = 'none';
  gameScreen.classList.remove('draw-mode-active');
  btnDraw.classList.remove('active');
  document.querySelectorAll('.draw-token').forEach(el => el.remove());
  renderGame(); // snap players back to zones
}

btnDraw.addEventListener('click', () => {
  state.drawMode ? exitDrawMode() : enterDrawMode();
});

btnClear.addEventListener('click', clearCanvas);

// ── Free-drag draw-tokens ─────────────────────
let freeDrag = null;

function startFreeDrag(e, token) {
  e.preventDefault();
  freeDrag = token;
  token.classList.add('dragging');

  function onMove(ev) {
    ev.preventDefault();
    if (!freeDrag) return;
    const t    = ev.touches[0];
    const rect = fieldEl.getBoundingClientRect();
    const x = Math.max(3, Math.min(97, ((t.clientX - rect.left) / rect.width)  * 100));
    const y = Math.max(3, Math.min(97, ((t.clientY - rect.top)  / rect.height) * 100));
    freeDrag.style.left = x + '%';
    freeDrag.style.top  = y + '%';
  }

  function onEnd() {
    if (freeDrag) freeDrag.classList.remove('dragging');
    freeDrag = null;
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend',  onEnd);
  }

  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend',  onEnd);
}

// ── Freehand drawing ──────────────────────────
let isDrawing = false;

fieldEl.addEventListener('touchstart', e => {
  if (!state.drawMode) return;

  // If touching a draw-token → free drag it
  const dt = e.target.closest('.draw-token');
  if (dt) { startFreeDrag(e, dt); return; }

  // Otherwise → draw
  e.preventDefault();
  isDrawing = true;
  const { x, y } = getCanvasCoords(e.touches[0]);
  ctx.beginPath();
  ctx.moveTo(x, y);

  function onDrawMove(ev) {
    ev.preventDefault();
    if (!isDrawing) return;
    const { x: dx, y: dy } = getCanvasCoords(ev.touches[0]);
    ctx.lineTo(dx, dy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(dx, dy);
  }

  function onDrawEnd() {
    isDrawing = false;
    document.removeEventListener('touchmove', onDrawMove);
    document.removeEventListener('touchend',  onDrawEnd);
  }

  document.addEventListener('touchmove', onDrawMove, { passive: false });
  document.addEventListener('touchend',  onDrawEnd);
}, { passive: false });

// ─────────────────────────────────────────────
//  PLAYING TIME PEEK
// ─────────────────────────────────────────────
let peekActive = false;
let peekTimer  = null;
let peekStartX = 0, peekStartY = 0;

function fmtPlayTime(secs) {
  return `${Math.floor(secs / 60)}:${pad(secs % 60)}`;
}

// Highlight which field players to sub out (red) and bench players to sub in (green).
// N = bench count → flag the N longest-on field players (FWDs prioritized on ties).
function applySubHints() {
  const tokens = document.querySelectorAll('#game-screen .player-token');
  tokens.forEach(t => t.classList.remove('sub-out-hint', 'sub-in-hint'));

  const benchCount = state.subs.length;
  if (benchCount === 0) return;

  // Build ranked list of field candidates (GK excluded)
  const candidates = ZONES
    .filter(zone => zone !== 'gk' && state.field[zone] !== null)
    .map(zone => ({
      num:   state.field[zone],
      time:  state.playTime[state.field[zone]] || 0,
      isFwd: zone.startsWith('fw'),
    }))
    .sort((a, b) => {
      if (b.time !== a.time) return b.time - a.time;       // most time first
      return a.isFwd === b.isFwd ? 0 : a.isFwd ? -1 : 1;  // FWDs before DEFs on tie
    });

  const subOutNums = new Set(
    candidates.slice(0, Math.min(benchCount, candidates.length)).map(c => c.num)
  );

  tokens.forEach(token => {
    const num = token.dataset.num;
    if (!num) return;
    if (subOutNums.has(num))          token.classList.add('sub-out-hint');
    else if (state.subs.includes(num)) token.classList.add('sub-in-hint');
  });
}

function enterPeek() {
  if (drag) return; // drag won the race — skip peek
  peekActive = true;
  gameScreen.classList.add('peek-mode');
  document.querySelectorAll('#game-screen .player-token').forEach(token => {
    const num = token.dataset.num;
    if (!num) return;
    token.dataset.savedText = token.textContent;
    token.textContent = fmtPlayTime(state.playTime[num] || 0);
  });
  applySubHints();
}

function exitPeek() {
  if (!peekActive) return;
  peekActive = false;
  gameScreen.classList.remove('peek-mode');
  document.querySelectorAll('#game-screen .player-token').forEach(token => {
    token.classList.remove('sub-out-hint', 'sub-in-hint');
    if (token.dataset.savedText !== undefined) {
      token.textContent = token.dataset.savedText;
      delete token.dataset.savedText;
    }
  });
}

gameScreen.addEventListener('touchstart', e => {
  if (drag || state.drawMode) return;
  peekStartX = e.touches[0].clientX;
  peekStartY = e.touches[0].clientY;
  peekTimer = setTimeout(() => { peekTimer = null; enterPeek(); }, 400);
}, { passive: true });

gameScreen.addEventListener('touchmove', e => {
  if (!peekTimer) return;
  const dx = e.touches[0].clientX - peekStartX;
  const dy = e.touches[0].clientY - peekStartY;
  if (Math.hypot(dx, dy) > 10) { clearTimeout(peekTimer); peekTimer = null; }
}, { passive: true });

gameScreen.addEventListener('touchend', () => {
  if (peekTimer) { clearTimeout(peekTimer); peekTimer = null; }
  exitPeek();
});

// ─────────────────────────────────────────────
//  HALFTIME / FULLTIME REPORT
// ─────────────────────────────────────────────
const reportModal = document.getElementById('report-modal');

document.getElementById('report-close').addEventListener('click', () => {
  reportModal.classList.remove('active');
});

function showReport(phase) {
  const maxTime = phase === 'fulltime' ? HALF * 2 : HALF;

  document.getElementById('report-title').textContent =
    phase === 'halftime' ? 'HALF TIME' : 'FULL TIME';

  const sorted = [...state.players].sort(
    (a, b) => (state.playTime[a] || 0) - (state.playTime[b] || 0)
  );

  const list = document.getElementById('report-list');
  list.innerHTML = '';

  sorted.forEach(num => {
    const total = state.playTime[num] || 0;
    const pos   = state.posTime[num]  || { fw:0, def:0, gk:0 };
    const pct   = total / maxTime;

    const statusClass = pct >= 0.7 ? 'heavy' : pct >= 0.4 ? 'moderate' : 'fresh';

    const fwW  = (pos.fw  / maxTime * 100).toFixed(1);
    const defW = (pos.def / maxTime * 100).toFixed(1);
    const gkW  = (pos.gk  / maxTime * 100).toFixed(1);

    const row = document.createElement('div');
    row.className = `report-row ${statusClass}`;
    row.innerHTML = `
      <div class="report-dot"></div>
      <div class="report-num">#${num}</div>
      <div class="report-time">${fmtPlayTime(total)}</div>
      <div class="report-bar-outer">
        <div class="bar-fw"  style="width:${fwW}%"></div>
        <div class="bar-def" style="width:${defW}%"></div>
        <div class="bar-gk"  style="width:${gkW}%"></div>
      </div>`;
    list.appendChild(row);
  });

  reportModal.classList.add('active');
}
</script>
</body>
</html>
